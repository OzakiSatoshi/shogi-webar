<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>将棋WebAR — 駒キャラ ギャラリー（Phase 2）</title>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="./pieces.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", sans-serif; background:#0c1424; }

    #hud { position: fixed; left: 0; right: 0; top: 0; z-index: 10; padding: 14px 16px 6px; text-align: center; color:#fff; pointer-events:none; }
    #kanji { font-size: 40px; font-weight: 800; line-height: 1; text-shadow: 0 2px 8px rgba(0,0,0,.5); }
    #name { font-size: 16px; margin-top: 4px; opacity: .95; }
    #romaji { font-size: 12px; opacity: .6; }
    #count { font-size: 12px; opacity: .6; margin-top: 2px; }
    #badge { display:inline-block; margin-top:6px; padding:2px 10px; border-radius:999px; font-size:11px; font-weight:700; background:#ffd700; color:#3a2a00; }

    .nav { position: fixed; top: 50%; transform: translateY(-50%); z-index: 11;
      width: 52px; height: 52px; border-radius: 50%; border: none; font-size: 22px; font-weight: 800;
      background: rgba(255,255,255,.16); color:#fff; }
    #prev { left: 12px; } #next { right: 12px; }

    #strip { position: fixed; left: 0; right: 0; bottom: 0; z-index: 11;
      display: flex; gap: 6px; overflow-x: auto; padding: 10px 10px calc(10px + env(safe-area-inset-bottom)); background: rgba(0,0,0,.45); }
    .chip { flex: 0 0 auto; min-width: 44px; height: 44px; border-radius: 10px; border: 2px solid transparent;
      background: rgba(255,255,255,.12); color:#fff; font-size: 18px; font-weight: 700; }
    .chip.promoted { color:#ffe48a; }
    .chip.active { border-color: #ffd24a; background: rgba(255,210,74,.25); }
  </style>
</head>
<body>
  <div id="hud">
    <div id="kanji">—</div>
    <div id="name">—</div>
    <div id="romaji"></div>
    <div id="count"></div>
    <div><span id="badge" style="display:none;">成駒</span></div>
  </div>
  <button id="prev" class="nav">‹</button>
  <button id="next" class="nav">›</button>
  <div id="strip"></div>

  <a-scene background="color: #0a1020" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false"
           renderer="colorManagement: true, physicallyCorrectLights, exposure: 1.1, toneMapping: ACESFilmic">
    <!-- ドラマチックな多灯ライティング -->
    <a-entity light="type: hemisphere; color: #95a8d0; groundColor: #221608; intensity: 0.55"></a-entity>
    <a-entity light="type: directional; color: #fff2dc; intensity: 1.1" position="2.5 4 2.5"></a-entity>
    <a-entity light="type: point; color: #4f9bff; intensity: 0.9; distance: 8" position="-2.2 1.4 -1.6"></a-entity>
    <a-entity light="type: point; color: #ff7a44; intensity: 0.5; distance: 7" position="2 0.5 1.8"></a-entity>

    <!-- 台座（発光リング付きヒーロー風）-->
    <a-cylinder color="#2a3f63" metalness="0.4" roughness="0.5" radius="0.55" height="0.1" position="0 -0.05 0"></a-cylinder>
    <a-cylinder color="#16243c" radius="0.62" height="0.04" position="0 -0.1 0"></a-cylinder>
    <a-torus material="color: #3fd0ff; emissive: #3fd0ff; emissiveIntensity: 1; metalness: 0; roughness: 0.4"
      radius="0.58" radius-tubular="0.012" rotation="-90 0 0" position="0 0.012 0"></a-torus>

    <!-- ターンテーブル（駒を載せて回転）-->
    <a-entity id="turntable" position="0 0 0"
      animation="property: rotation; from: 0 0 0; to: 0 360 0; dur: 9000; loop: true; easing: linear">
      <a-entity id="pieceHolder"></a-entity>
    </a-entity>

    <a-entity camera="fov: 40" position="0 0.92 4.3" rotation="-6 0 0" look-controls="enabled: false"></a-entity>
  </a-scene>

  <script>
    const PIECES = window.SHOGI_PIECES;
    const holder = document.getElementById('pieceHolder');
    const elKanji = document.getElementById('kanji'), elName = document.getElementById('name'),
          elRomaji = document.getElementById('romaji'), elCount = document.getElementById('count'),
          elBadge = document.getElementById('badge'), strip = document.getElementById('strip');
    let idx = 0;

    // 下部の駒チップ
    PIECES.forEach((p, i) => {
      const b = document.createElement('button');
      b.className = 'chip' + (p.promoted ? ' promoted' : '');
      b.textContent = p.kanji; b.title = p.name;
      b.onclick = () => show(i);
      strip.appendChild(b);
    });
    const chips = Array.from(strip.children);

    function show(i) {
      idx = (i + PIECES.length) % PIECES.length;
      const p = PIECES[idx];
      holder.innerHTML = window.shogiPieceEntityHTML(p.key, { scale: 1, bobDur: 1100 });
      elKanji.textContent = p.kanji;
      elName.textContent = p.name;
      elRomaji.textContent = p.romaji;
      elCount.textContent = (idx + 1) + ' / ' + PIECES.length;
      elBadge.style.display = p.promoted ? 'inline-block' : 'none';
      chips.forEach((c, j) => c.classList.toggle('active', j === idx));
      const active = chips[idx]; if (active) active.scrollIntoView({ inline: 'center', block: 'nearest' });
    }

    document.getElementById('prev').onclick = () => show(idx - 1);
    document.getElementById('next').onclick = () => show(idx + 1);
    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') show(idx - 1);
      if (e.key === 'ArrowRight') show(idx + 1);
    });

    document.querySelector('a-scene').addEventListener('loaded', () => show(0));
  </script>
</body>
</html>
