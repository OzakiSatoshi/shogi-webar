<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>将棋WebAR — 駒キャラAR</title>

  <!-- A-Frame 1.3.0（MindAR 1.2.x 対応） -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <!-- MindAR：AR実行コンポーネント＋Compiler を内包 -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <!-- 駒キャラのビルダー -->
  <script src="./pieces.js"></script>

  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", sans-serif; }
    #ui {
      position: fixed; inset: 0; z-index: 30; overflow-y: auto;
      display: flex; flex-direction: column; align-items: center;
      padding: 20px 16px 40px; text-align: center; color: #fff;
      background: linear-gradient(160deg, #1b2a4a, #0c1424);
      transition: opacity .4s ease;
    }
    #ui.hidden { opacity: 0; pointer-events: none; }
    #ui h1 { font-size: 19px; margin: 6px 0; }
    #ui p { font-size: 13px; line-height: 1.6; opacity: .9; margin: 5px 0; max-width: 390px; }
    #gridWrap { margin: 12px 0; }
    #gridCanvas { width: min(90vw, 460px); height: auto; border-radius: 10px; border: 3px solid rgba(255,255,255,.25); background:#fff; }
    #compileBox { margin: 8px 0 4px; width: min(90vw, 460px); }
    #bar { height: 10px; background: rgba(255,255,255,.18); border-radius: 999px; overflow: hidden; }
    #barFill { height: 100%; width: 0%; background: #ffd24a; transition: width .2s ease; }
    #compileText { font-size: 12px; margin-top: 6px; opacity: .9; }
    #startBtn {
      margin-top: 14px; padding: 14px 28px; font-size: 16px; font-weight: 700;
      color: #0c1424; background: #ffd24a; border: none; border-radius: 999px; cursor: pointer;
    }
    #startBtn:disabled { opacity: .45; }
    .setbtns { margin-top: 6px; display: flex; gap: 8px; }
    .setbtns a { font-size: 12px; padding: 5px 12px; border-radius: 999px; text-decoration: none;
      background: rgba(255,255,255,.12); color:#fff; border: 1px solid transparent; }
    .setbtns a.on { border-color: #ffd24a; background: rgba(255,210,74,.2); }

    #status {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%); z-index: 20;
      padding: 8px 16px; border-radius: 999px; font-size: 13px; font-weight: 700;
      background: rgba(0,0,0,.55); color: #fff; transition: background .2s ease;
    }
    #status.tracking { background: rgba(34, 160, 90, .9); }
    #status.hidden { display: none; }
    #fps {
      position: fixed; top: 12px; left: 12px; z-index: 20;
      padding: 6px 10px; border-radius: 8px; font-size: 12px; font-weight: 700;
      font-family: ui-monospace, Menlo, Consolas, monospace; background: rgba(0,0,0,.55); color: #7fe6ff;
    }
    #fps.hidden { display: none; }
    #log {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 25;
      max-height: 32vh; overflow-y: auto; margin: 0; padding: 8px 10px;
      font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 11px; line-height: 1.45;
      color: #b8f5c8; background: rgba(0,0,0,.62); white-space: pre-wrap; word-break: break-all; display: none;
    }
    #log .e { color: #ff8a8a; } #log .w { color: #ffd24a; }
    #logToggle {
      position: fixed; right: 10px; bottom: 8px; z-index: 26;
      padding: 6px 12px; font-size: 12px; border: none; border-radius: 6px; background: rgba(0,0,0,.6); color:#fff;
    }
  </style>
</head>
<body>
  <div id="ui">
    <h1>将棋WebAR — 駒キャラAR</h1>
    <p>下の<strong>マーカーシート</strong>を別画面（PC/タブレット）に表示、または印刷して、各マーカーを物理駒の近くに置きます。
       カメラで映すと、各マーカー（駒の漢字付き）の上に対応する<strong>3Dキャラ</strong>が立ちます。</p>
    <div class="setbtns" id="setbtns">
      <a href="?set=types" data-set="types">全14種</a>
      <a href="?set=side" data-set="side">先手20枚</a>
      <a href="?set=full" data-set="full">両陣40枚</a>
    </div>
    <div id="gridWrap"><canvas id="gridCanvas"></canvas></div>
    <div id="compileBox">
      <div id="bar"><div id="barFill"></div></div>
      <div id="compileText">準備中…</div>
    </div>
    <button id="startBtn" disabled>カメラを起動してARを開始</button>
    <p id="meta" style="margin-top:10px; font-size:12px; opacity:.6;"></p>
    <p style="font-size:12px; opacity:.55;">iPhoneはSafari、AndroidはChrome推奨。初回はマーカーのコンパイルに時間がかかります（結果はキャッシュ）。</p>
  </div>

  <div id="status" class="hidden">マーカーを探しています…</div>
  <div id="fps" class="hidden">FPS: --</div>
  <button id="logToggle">ログ</button>
  <pre id="log"></pre>

  <script>
    // ---------- デバッグログ ----------
    const logEl = document.getElementById('log');
    function log(msg, cls) {
      const t = new Date().toISOString().substr(11, 8);
      const s = document.createElement('span'); if (cls) s.className = cls;
      s.textContent = `[${t}] ${msg}\n`; logEl.appendChild(s); logEl.scrollTop = logEl.scrollHeight;
    }
    document.getElementById('logToggle').onclick = () => { logEl.style.display = (logEl.style.display==='none')?'block':'none'; };
    window.addEventListener('error', e => log('window error: ' + (e.message||e), 'e'));
    window.addEventListener('unhandledrejection', e => log('promise rejected: ' + (e.reason && e.reason.message || e.reason), 'e'));

    // ---------- セット定義 ----------
    // 先手1陣の構成（20枚）
    const SIDE = [
      { key: 'ou',  kanji: '王', n: 1 },
      { key: 'hi',  kanji: '飛', n: 1 },
      { key: 'kaku',kanji: '角', n: 1 },
      { key: 'kin', kanji: '金', n: 2 },
      { key: 'gin', kanji: '銀', n: 2 },
      { key: 'kei', kanji: '桂', n: 2 },
      { key: 'kyo', kanji: '香', n: 2 },
      { key: 'fu',  kanji: '歩', n: 9 },
    ];
    function buildPieceList(setName) {
      const list = [];
      if (setName === 'types') {
        (window.SHOGI_PIECES || []).forEach(p => list.push({ key: p.key, kanji: p.kanji, owner: 0 }));
      } else {
        const owners = setName === 'full' ? [0, 1] : [0];
        owners.forEach(owner => SIDE.forEach(c => { for (let j = 0; j < c.n; j++) list.push({ key: c.key, kanji: c.kanji, owner }); }));
      }
      return list;
    }

    const params = new URLSearchParams(location.search);
    let SET = params.get('set') || 'types';
    if (!['types', 'side', 'full'].includes(SET)) SET = 'types';
    const SIZE = parseInt(params.get('size') || '384', 10);
    const MARKER = (params.get('marker') || 'real');   // real（本物の駒面）/ koma（自作駒風）/ pattern（抽象・高追従）
    const pieceList = buildPieceList(SET).slice(0, 40);
    const N = pieceList.length;
    document.querySelectorAll('#setbtns a').forEach(a => a.classList.toggle('on', a.dataset.set === SET));
    document.getElementById('meta').textContent = `セット: ${SET} / マーカー ${N} 枚 / maxTrack ${N}`;
    log(`set=${SET}, N=${N}, size=${SIZE}`);
    log('secure? ' + window.isSecureContext + ' / getUserMedia? ' + !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia));

    // ---------- マーカー生成 ----------
    function seededRnd(gIndex) {
      let seed = (gIndex * 2654435761) % 2147483647; if (seed <= 0) seed += 2147483646;
      return () => { seed = (seed * 48271) % 2147483647; return seed / 2147483647; };
    }

    // 将棋の駒風マーカー：五角形の木地＋毛筆風の漢字＋駒ごと固有の杢・節（追従＆個体識別）
    function makeMarkerKoma(gIndex, kanji, label, owner, size) {
      const c = document.createElement('canvas'); c.width = size; c.height = size;
      const x = c.getContext('2d');
      const rnd = seededRnd(gIndex);
      // 盤のような濃い木地の背景（駒とのコントラストで検出しやすく）
      x.fillStyle = '#241a10'; x.fillRect(0, 0, size, size);
      // 駒の五角形（上がとがり下が広い）
      const m = size * 0.09, top = m, bottom = size - m, cx = size / 2, w = size - 2 * m;
      const shoulder = top + (bottom - top) * 0.2;
      const pts = [[cx, top], [cx - w*0.34, shoulder], [cx - w*0.42, bottom], [cx + w*0.42, bottom], [cx + w*0.34, shoulder]];
      const pent = () => { x.beginPath(); x.moveTo(pts[0][0], pts[0][1]); for (let i=1;i<pts.length;i++) x.lineTo(pts[i][0], pts[i][1]); x.closePath(); };
      // 木地グラデ
      const g = x.createLinearGradient(0, top, 0, bottom);
      g.addColorStop(0, '#f2d79e'); g.addColorStop(1, '#d3a85d');
      pent(); x.fillStyle = g; x.fill();
      // 駒内に固有の杢目＋節（クリップ）
      x.save(); pent(); x.clip();
      for (let i = 0; i < 26; i++) {       // 木目の波線
        const yy = top + (bottom - top) * rnd();
        x.strokeStyle = `rgba(120,78,38,${0.12 + rnd()*0.26})`; x.lineWidth = 1 + rnd()*2.5;
        x.beginPath(); x.moveTo(0, yy);
        for (let xx = 0; xx <= size; xx += size/8) x.lineTo(xx, yy + Math.sin(xx*0.03 + rnd()*6) * (3 + rnd()*6));
        x.stroke();
      }
      for (let i = 0; i < 60; i++) {        // 節・斑（高コントラスト＝特徴点）
        const px = rnd()*size, py = top + (bottom-top)*rnd(), r = 2 + rnd()*7;
        x.fillStyle = rnd() < 0.5 ? `rgba(86,52,22,${0.3 + rnd()*0.5})` : `rgba(255,242,212,${0.2 + rnd()*0.4})`;
        x.beginPath(); x.ellipse(px, py, r, r*(0.4 + rnd()*0.8), rnd()*6, 0, 6.283); x.fill();
      }
      x.restore();
      // 毛筆風の漢字
      const fs = kanji.length > 1 ? size*0.24 : size*0.42;
      x.font = `bold ${fs|0}px "Hiragino Mincho ProN", "Yu Mincho", "Noto Serif JP", serif`;
      x.textAlign = 'center'; x.textBaseline = 'middle';
      x.fillStyle = owner ? '#5a1810' : '#241008';
      x.fillText(kanji, cx, (top + bottom) / 2 - size*0.01);
      // 駒の輪郭
      pent(); x.lineWidth = Math.max(3, size*0.018); x.strokeStyle = '#6e4a22'; x.stroke();
      // 落款風の通し番号＋陣（先手△ / 後手▽）
      const tag = (owner ? '▽' : '△') + label;
      x.font = `bold ${(size*0.1)|0}px sans-serif`; x.textAlign = 'center'; x.textBaseline = 'alphabetic';
      x.fillStyle = '#5a3a1a'; x.fillText(tag, cx, bottom - size*0.035);
      return c;
    }

    // 抽象パターン（最大追従・フォールバック）
    function makeMarkerPattern(gIndex, kanji, label, owner, size) {
      const c = document.createElement('canvas'); c.width = size; c.height = size;
      const x = c.getContext('2d'); const rnd = seededRnd(gIndex);
      x.fillStyle = '#fff'; x.fillRect(0, 0, size, size);
      for (let i = 0; i < 150; i++) {
        x.fillStyle = `rgb(${(rnd()*256)|0},${(rnd()*256)|0},${(rnd()*256)|0})`;
        const px = rnd()*size, py = rnd()*size, s = 4 + rnd()*size*0.12;
        x.save(); x.translate(px, py); x.rotate(rnd()*6.283);
        const t = rnd();
        if (t < 0.4) x.fillRect(-s/2, -s/2, s, s);
        else if (t < 0.7) { x.beginPath(); x.arc(0,0,s/2,0,6.283); x.fill(); }
        else { x.beginPath(); x.moveTo(0,-s/2); x.lineTo(s/2,s/2); x.lineTo(-s/2,s/2); x.closePath(); x.fill(); }
        x.restore();
      }
      x.strokeStyle = '#000'; x.lineWidth = Math.max(3, size*0.035); x.strokeRect(0,0,size,size);
      const fs = kanji.length > 1 ? size*0.26 : size*0.4;
      x.font = `bold ${fs|0}px sans-serif`; x.textAlign = 'center'; x.textBaseline = 'middle';
      x.lineWidth = size*0.04; x.strokeStyle = '#fff'; x.strokeText(kanji, size/2, size/2);
      x.fillStyle = owner ? '#7a1020' : '#101a30'; x.fillText(kanji, size/2, size/2);
      x.font = `bold ${(size*0.11)|0}px sans-serif`; x.textAlign = 'left'; x.textBaseline = 'top';
      const tag = (owner ? '▽' : '△') + label;
      x.lineWidth = size*0.03; x.strokeStyle = '#fff'; x.strokeText(tag, size*0.06, size*0.05);
      x.fillStyle = '#000'; x.fillText(tag, size*0.06, size*0.05);
      return c;
    }

    // 本物の駒面画像（Ka-hu/shogi-pieces, CC BY 4.0）を読み込む
    const faceImg = {};
    async function loadFaces() {
      const keys = [...new Set(pieceList.map(p => p.key))];
      await Promise.all(keys.map(k => new Promise(res => {
        const im = new Image();
        im.onload = () => { faceImg[k] = im; res(); };
        im.onerror = () => { log('face load fail: ' + k, 'e'); res(); };
        im.src = `./assets/koma/${k}.svg`;
      })));
      log('faces loaded: ' + Object.keys(faceImg).length + '/' + keys.length);
    }

    // 本物の駒面マーカー：標準の駒面＋駒ごと固有の杢（追従＆同種駒の識別）
    function makeMarkerReal(gIndex, key, label, owner, size) {
      const c = document.createElement('canvas'); c.width = size; c.height = size;
      const x = c.getContext('2d'); const rnd = seededRnd(gIndex);
      x.fillStyle = '#241a10'; x.fillRect(0, 0, size, size);
      const img = faceImg[key];
      const m = size * 0.06, maxW = size - 2*m, maxH = size - 2*m;
      let dw = maxW, dh = maxH;
      if (img && img.width) { const ar = img.width / img.height; dh = maxH; dw = dh*ar; if (dw > maxW) { dw = maxW; dh = dw/ar; } }
      x.save(); x.translate(size/2, size/2); if (owner) x.rotate(Math.PI);
      if (img) x.drawImage(img, -dw/2, -dh/2, dw, dh);
      // 固有の杢（駒面に薄く重ね、同種でも個体差を出す＝追従＆識別）
      for (let i = 0; i < 55; i++) {
        const px = (rnd()-0.5)*dw*0.9, py = (rnd()-0.5)*dh*0.92, r = 2 + rnd()*6;
        x.fillStyle = rnd() < 0.5 ? `rgba(70,45,20,${0.18 + rnd()*0.32})` : `rgba(255,246,222,${0.12 + rnd()*0.26})`;
        x.beginPath(); x.ellipse(px, py, r, r*(0.4 + rnd()*0.7), rnd()*6, 0, 6.283); x.fill();
      }
      x.restore();
      const tag = (owner ? '▽' : '△') + label;
      x.font = `bold ${(size*0.09)|0}px sans-serif`; x.textAlign = 'left'; x.textBaseline = 'top';
      x.lineWidth = size*0.025; x.strokeStyle = 'rgba(255,255,255,.75)'; x.strokeText(tag, size*0.04, size*0.04);
      x.fillStyle = '#222'; x.fillText(tag, size*0.04, size*0.04);
      return c;
    }

    let markers = [];
    function drawGrid() {
      const cols = Math.ceil(Math.sqrt(N)), rows = Math.ceil(N/cols), cell = 180, pad = 10;
      const g = document.getElementById('gridCanvas');
      g.width = cols*cell + pad*2; g.height = rows*cell + pad*2;
      const gx = g.getContext('2d'); gx.fillStyle = '#fff'; gx.fillRect(0,0,g.width,g.height);
      markers.forEach((mk, idx) => {
        const cx = pad + (idx%cols)*cell, cy = pad + ((idx/cols)|0)*cell;
        gx.drawImage(mk.canvas, cx+6, cy+6, cell-12, cell-12);
      });
    }
    async function buildMarkers() {
      if (MARKER === 'real') await loadFaces();
      const typeCount = {};
      markers = pieceList.map((p, i) => {
        typeCount[p.key + p.owner] = (typeCount[p.key + p.owner] || 0) + 1;
        const within = typeCount[p.key + p.owner];
        const sameType = pieceList.filter(q => q.key === p.key && q.owner === p.owner).length;
        const label = sameType > 1 ? String(within) : '';
        let canvas;
        if (MARKER === 'real') canvas = makeMarkerReal(i+1, p.key, label, p.owner, SIZE);
        else if (MARKER === 'pattern') canvas = makeMarkerPattern(i+1, p.kanji, label, p.owner, SIZE);
        else canvas = makeMarkerKoma(i+1, p.kanji, label, p.owner, SIZE);
        return { piece: p, label, canvas };
      });
      log(`generated ${markers.length} markers (${MARKER})`);
      drawGrid();
    }

    // ---------- IndexedDB キャッシュ ----------
    function idbOpen(){ return new Promise((res,rej)=>{ const r=indexedDB.open('mindcache',1);
      r.onupgradeneeded=()=>r.result.createObjectStore('mind'); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
    async function idbGet(k){ const db=await idbOpen(); return new Promise((res,rej)=>{ const t=db.transaction('mind','readonly').objectStore('mind').get(k); t.onsuccess=()=>res(t.result); t.onerror=()=>rej(t.error); }); }
    async function idbPut(k,v){ const db=await idbOpen(); return new Promise((res,rej)=>{ const t=db.transaction('mind','readwrite').objectStore('mind').put(v,k); t.onsuccess=()=>res(); t.onerror=()=>rej(t.error); }); }

    function loadImg(src){ return new Promise((res,rej)=>{ const im=new Image(); im.onload=()=>res(im); im.onerror=rej; im.src=src; }); }
    const barFill = document.getElementById('barFill'), compileText = document.getElementById('compileText');
    function setProgress(p){ barFill.style.width = Math.max(0,Math.min(100,p)) + '%'; }

    async function buildMind() {
      const key = `mind-pieces-v2-${MARKER}-${SET}-s${SIZE}`;
      try {
        const cached = await idbGet(key);
        if (cached && cached.byteLength) { log('cache hit: ' + key); compileText.textContent='コンパイル済み（キャッシュ）'; setProgress(100); return cached; }
      } catch(e){ log('idb get fail: ' + e, 'w'); }
      compileText.textContent = 'マーカーをコンパイル中…（初回のみ・実機GPUで実行）';
      log('compiling…');
      const images = await Promise.all(markers.map(m => loadImg(m.canvas.toDataURL('image/png'))));
      const compiler = new window.MINDAR.IMAGE.Compiler();
      await compiler.compileImageTargets(images, (p) => { setProgress(p); compileText.textContent = 'コンパイル中… ' + p.toFixed(0) + '%'; });
      const buf = await compiler.exportData();
      const bytes = (buf instanceof Uint8Array) ? buf : new Uint8Array(buf);
      log('compiled. .mind bytes=' + bytes.length, 'w');
      try { await idbPut(key, bytes); } catch(e){ log('idb put fail: ' + e, 'w'); }
      compileText.textContent = 'コンパイル完了';
      return bytes;
    }

    // ---------- 駒キャラの target entity ----------
    function targetHTML(i) {
      const m = markers[i];
      const ownerRot = m.piece.owner ? 180 : 0;          // 後手は180°反転
      const inner = window.shogiPieceEntityHTML(m.piece.key, { scale: 0.32, bobDur: 1000 + (i % 5) * 90 });
      return `<a-entity class="target" data-name="${m.piece.kanji}${m.label}" mindar-image-target="targetIndex: ${i}">
        <a-entity rotation="90 0 0" position="0 0 0.01">
          <a-entity rotation="0 ${ownerRot} 0">${inner}</a-entity>
        </a-entity>
      </a-entity>`;
    }

    // ---------- AR シーン ----------
    let sceneEl = null, tracked = 0;
    const statusEl = document.getElementById('status'), fpsEl = document.getElementById('fps');
    function refreshStatus(){
      if (tracked>0){ statusEl.textContent = `表示中: ${tracked} / ${N} 駒`; statusEl.classList.add('tracking'); }
      else { statusEl.textContent = 'マーカーを探しています…'; statusEl.classList.remove('tracking'); }
    }
    let _f=0,_t=performance.now();
    function fpsLoop(now){ _f++; if(now-_t>=1000){ fpsEl.textContent='FPS: '+_f; _f=0; _t=now; } requestAnimationFrame(fpsLoop); }

    function buildScene(blobUrl){
      const scene = document.createElement('a-scene');
      scene.setAttribute('mindar-image', `imageTargetSrc: ${blobUrl}; autoStart: false; maxTrack: ${N}; uiScanning: no; uiLoading: no; uiError: no;`);
      scene.setAttribute('color-space','sRGB');
      scene.setAttribute('renderer','colorManagement: true, physicallyCorrectLights, exposure: 1.05');
      scene.setAttribute('vr-mode-ui','enabled: false');
      scene.setAttribute('device-orientation-permission-ui','enabled: false');
      let targets=''; for (let i=0;i<N;i++) targets += targetHTML(i);
      scene.innerHTML = `
        <a-entity light="type: hemisphere; color: #cfe0ff; groundColor: #54402a; intensity: 0.7"></a-entity>
        <a-entity light="type: directional; color: #fff4e0; intensity: 0.95" position="1 2 1.5"></a-entity>
        <a-entity light="type: point; color: #88b4ff; intensity: 0.4; distance: 6" position="-1 1 1"></a-entity>
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        ${targets}`;
      document.body.appendChild(scene);
      scene.addEventListener('arReady', () => log('arReady', 'w'));
      scene.addEventListener('arError', (e) => log('arError: ' + JSON.stringify(e.detail||{}), 'e'));

      let readyDone = false;
      function onReady(reason){
        if (readyDone) return;
        const sys = scene.systems && scene.systems['mindar-image-system'];
        if (!sys) return;
        readyDone = true;
        startBtn.disabled = false;
        startBtn.textContent = 'カメラを起動してARを開始';
        compileText.textContent = '準備完了 — 「カメラを起動」をタップしてください';
        log('scene ready (' + reason + ')', 'w');
        try {
          document.querySelectorAll('.target').forEach(el => {
            const name = el.getAttribute('data-name');
            el.addEventListener('targetFound', () => { tracked++; log(`found ${name}（${tracked}/${N}）`); refreshStatus(); });
            el.addEventListener('targetLost', () => { tracked=Math.max(0,tracked-1); log(`lost ${name}`); refreshStatus(); });
          });
        } catch(e){ log('listener err: ' + (e && e.message || e), 'e'); }
      }
      scene.addEventListener('loaded', () => onReady('loaded'));
      if (scene.hasLoaded) onReady('already-loaded');
      let tries = 0;
      const iv = setInterval(() => {
        if (readyDone) { clearInterval(iv); return; }
        onReady('poll');
        if (++tries > 50) { clearInterval(iv); if (!readyDone) { compileText.textContent = 'AR初期化に時間がかかっています（ログ確認）'; log('ready timeout', 'e'); } }
      }, 200);
      return scene;
    }

    // ---------- 起動フロー ----------
    const startBtn = document.getElementById('startBtn');
    (async function init(){
      if (!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia)) { compileText.textContent='このブラウザはカメラAPIに非対応です'; log('no getUserMedia','e'); return; }
      if (!(window.MINDAR && window.MINDAR.IMAGE && window.MINDAR.IMAGE.Compiler)) { compileText.textContent='Compilerが読み込めませんでした'; log('no Compiler','e'); return; }
      if (!window.shogiPieceEntityHTML) { compileText.textContent='pieces.js が読み込めませんでした'; log('no pieces.js','e'); return; }
      try {
        await buildMarkers();                          // マーカー生成（real は駒面画像を読込）
        const bytes = await buildMind();
        const blob = new Blob([bytes], { type:'application/octet-stream' });
        const url = URL.createObjectURL(blob);
        log('.mind blob 準備完了');
        sceneEl = buildScene(url);
      } catch(e){ compileText.textContent='コンパイル失敗: ' + (e && e.message || e); log('init error: ' + (e && e.message || e), 'e'); }
    })();

    startBtn.addEventListener('click', () => {
      if (!sceneEl) return;
      startBtn.disabled = true; startBtn.textContent='起動中…'; log('startBtn tapped');
      const sys = sceneEl.systems['mindar-image-system'];
      if (!sys) { log('mindar-image-system なし','e'); return; }
      let ret;
      try { ret = sys.start(); }
      catch (e) { log('start() 例外: ' + (e && e.message || e), 'e'); startBtn.disabled=false; startBtn.textContent='カメラを起動してARを開始'; return; }
      Promise.resolve(ret).then(() => {
        log('start() 完了。マーカーを映してください', 'w');
        document.getElementById('ui').classList.add('hidden');
        statusEl.classList.remove('hidden'); fpsEl.classList.remove('hidden');
        requestAnimationFrame(fpsLoop);
      }).catch(e => {
        log('start() 失敗: ' + (e && e.message || e), 'e');
        startBtn.disabled=false; startBtn.textContent='カメラを起動してARを開始';
      });
    });

    window.addEventListener('beforeunload', () => { const sys = sceneEl && sceneEl.systems['mindar-image-system']; if (sys) sys.stop(); });
  </script>
</body>
</html>
