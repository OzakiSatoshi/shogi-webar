<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>将棋WebAR — Phase 1-3 複数マーカー同時追従テスト</title>

  <!-- A-Frame 本体（MindAR 1.2.x が動作確認しているのは 1.3.0） -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <!-- MindAR (Image Tracking) の A-Frame 連携ビルド -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", sans-serif; }

    #ui {
      position: fixed; inset: 0; z-index: 30;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px; text-align: center; color: #fff;
      background: linear-gradient(160deg, #1b2a4a, #0c1424);
      transition: opacity .4s ease; overflow-y: auto;
    }
    #ui.hidden { opacity: 0; pointer-events: none; }
    #ui h1 { font-size: 19px; margin: 0 0 6px; }
    #ui p { font-size: 13px; line-height: 1.6; opacity: .9; margin: 5px 0; max-width: 360px; }
    #startBtn {
      margin-top: 18px; padding: 14px 28px; font-size: 16px; font-weight: 700;
      color: #0c1424; background: #ffd24a; border: none; border-radius: 999px; cursor: pointer;
    }
    #startBtn:disabled { opacity: .6; }
    .markers { display: flex; gap: 14px; margin-top: 14px; }
    .markers figure { margin: 0; }
    .markers img { width: 110px; border-radius: 8px; border: 3px solid rgba(255,255,255,.25); display:block; }
    .markers figcaption { font-size: 11px; margin-top: 4px; opacity: .85; }

    #status {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%); z-index: 20;
      padding: 8px 16px; border-radius: 999px; font-size: 13px; font-weight: 700;
      background: rgba(0,0,0,.55); color: #fff; transition: background .2s ease;
    }
    #status.tracking { background: rgba(34, 160, 90, .9); }
    #status.hidden { display: none; }

    #log {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 25;
      max-height: 34vh; overflow-y: auto; margin: 0; padding: 8px 10px;
      font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 11px; line-height: 1.45;
      color: #b8f5c8; background: rgba(0,0,0,.62); white-space: pre-wrap; word-break: break-all;
    }
    #log .e { color: #ff8a8a; } #log .w { color: #ffd24a; }
    #logToggle {
      position: fixed; right: 10px; bottom: calc(34vh + 6px); z-index: 26;
      padding: 6px 12px; font-size: 12px; border: none; border-radius: 6px;
      background: rgba(0,0,0,.6); color:#fff;
    }
  </style>
</head>
<body>
  <div id="ui">
    <h1>将棋WebAR — 複数マーカー同時追従テスト</h1>
    <p>2枚のマーカーを同時にカメラに収めると、それぞれの上に別の駒（歩兵 / 角行）が立ちます。
       同時に追従できる枚数と動作の重さ（FPS）を確認するための検証版です。</p>
    <p>下の2画像を別の画面（PC/タブレット）に並べて表示、または印刷して使ってください。</p>
    <div class="markers">
      <figure>
        <img src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/band-example/raccoon.png" alt="マーカーA" />
        <figcaption>マーカーA → 歩兵</figcaption>
      </figure>
      <figure>
        <img src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/band-example/bear.png" alt="マーカーB" />
        <figcaption>マーカーB → 角行</figcaption>
      </figure>
    </div>
    <button id="startBtn">カメラを起動してARを開始</button>
    <p id="note" style="margin-top:12px; font-size:12px; opacity:.65;">※ iPhone は Safari、Android は Chrome 推奨。左上にFPS等の統計を表示します。</p>
  </div>

  <div id="status" class="hidden">マーカーを探しています…</div>

  <button id="logToggle">ログ表示/非表示</button>
  <pre id="log"></pre>

  <a-scene
    mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/band-example/band.mind; autoStart: false; maxTrack: 2; showStats: true; uiScanning: no; uiLoading: no; uiError: no;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets></a-assets>

    <a-entity light="type: ambient; intensity: 0.9;"></a-entity>
    <a-entity light="type: directional; intensity: 0.7;" position="0.5 1 1"></a-entity>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- ===== マーカーA (targetIndex 0)：歩兵 ===== -->
    <a-entity class="target" data-name="歩兵" mindar-image-target="targetIndex: 0">
      <a-entity rotation="90 0 0" position="0 0 0.01">
        <a-entity scale="0.35 0.35 0.35"
          animation__bob="property: position; from: 0 0 0; to: 0 0.12 0; dir: alternate; dur: 1100; loop: true; easing: easeInOutSine"
          animation__spin="property: rotation; from: 0 -8 0; to: 0 8 0; dir: alternate; dur: 1700; loop: true; easing: easeInOutSine">
          <a-box color="#d23b3b" depth="0.45" height="0.5" width="0.6" position="0 0.25 0"></a-box>
          <a-cone color="#ffd24a" radius-bottom="0.28" radius-top="0" height="0.4" position="0 0.7 0"></a-cone>
          <a-sphere color="#1b1b1b" radius="0.04" position="-0.1 0.55 0.24"></a-sphere>
          <a-sphere color="#1b1b1b" radius="0.04" position="0.1 0.55 0.24"></a-sphere>
          <a-cylinder color="#9a6b3f" radius="0.025" height="1.0" position="0.4 0.5 0"></a-cylinder>
          <a-cone color="#cfd3da" radius-bottom="0.06" radius-top="0" height="0.18" position="0.4 1.05 0"></a-cone>
          <a-ring color="#000000" opacity="0.18" radius-inner="0.1" radius-outer="0.34" rotation="-90 0 0" position="0 0.005 0"></a-ring>
        </a-entity>
      </a-entity>
    </a-entity>

    <!-- ===== マーカーB (targetIndex 1)：角行 ===== -->
    <a-entity class="target" data-name="角行" mindar-image-target="targetIndex: 1">
      <a-entity rotation="90 0 0" position="0 0 0.01">
        <a-entity scale="0.35 0.35 0.35"
          animation__bob="property: position; from: 0 0 0; to: 0 0.12 0; dir: alternate; dur: 1250; loop: true; easing: easeInOutSine"
          animation__spin="property: rotation; from: 0 -8 0; to: 0 8 0; dir: alternate; dur: 1900; loop: true; easing: easeInOutSine">
          <!-- 紫のローブ（細長い円柱） -->
          <a-cylinder color="#7a3fb0" radius="0.3" height="0.7" position="0 0.35 0"></a-cylinder>
          <!-- 頭（肌色の球） -->
          <a-sphere color="#ffe0b0" radius="0.22" position="0 0.85 0"></a-sphere>
          <a-sphere color="#1b1b1b" radius="0.035" position="-0.08 0.86 0.2"></a-sphere>
          <a-sphere color="#1b1b1b" radius="0.035" position="0.08 0.86 0.2"></a-sphere>
          <!-- 杖（円柱＋先端の光球） -->
          <a-cylinder color="#5a3b1f" radius="0.02" height="1.1" position="0.36 0.55 0"></a-cylinder>
          <a-sphere color="#7fe6ff" radius="0.08" position="0.36 1.15 0"></a-sphere>
          <a-ring color="#000000" opacity="0.18" radius-inner="0.1" radius-outer="0.34" rotation="-90 0 0" position="0 0.005 0"></a-ring>
        </a-entity>
      </a-entity>
    </a-entity>
  </a-scene>

  <script>
    const logEl = document.getElementById('log');
    function log(msg, cls) {
      const t = new Date().toISOString().substr(11, 8);
      const line = document.createElement('span');
      if (cls) line.className = cls;
      line.textContent = `[${t}] ${msg}\n`;
      logEl.appendChild(line); logEl.scrollTop = logEl.scrollHeight;
    }
    document.getElementById('logToggle').addEventListener('click', () => {
      logEl.style.display = (logEl.style.display === 'none') ? 'block' : 'none';
    });
    window.addEventListener('error', (e) => log('window error: ' + (e.message || e), 'e'));
    window.addEventListener('unhandledrejection', (e) => log('promise rejected: ' + (e.reason && e.reason.message || e.reason), 'e'));

    log('page loaded. UA=' + navigator.userAgent.substr(0, 60));
    log('secure context? ' + window.isSecureContext + ' / getUserMedia? ' + !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia));

    const ui = document.getElementById('ui');
    const startBtn = document.getElementById('startBtn');
    const note = document.getElementById('note');
    const statusEl = document.getElementById('status');
    const sceneEl = document.querySelector('a-scene');

    // 同時追従中の枚数をカウントして表示
    let tracked = 0;
    function refreshStatus() {
      if (tracked > 0) {
        statusEl.textContent = `同時追従: ${tracked} 枚`;
        statusEl.classList.add('tracking');
      } else {
        statusEl.textContent = 'マーカーを探しています…';
        statusEl.classList.remove('tracking');
      }
    }
    document.querySelectorAll('.target').forEach((el) => {
      const name = el.getAttribute('data-name');
      el.addEventListener('targetFound', () => { tracked++; log(`targetFound ✅ ${name}（同時 ${tracked} 枚）`); refreshStatus(); });
      el.addEventListener('targetLost', () => { tracked = Math.max(0, tracked - 1); log(`targetLost ${name}（同時 ${tracked} 枚）`); refreshStatus(); });
    });

    sceneEl.addEventListener('arReady', () => log('arReady (MindAR 準備完了)'));
    sceneEl.addEventListener('arError', (e) => log('arError: ' + JSON.stringify(e.detail || {}), 'e'));

    if (!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia)) {
      startBtn.disabled = true; note.textContent = '※ このブラウザはカメラAPIに対応していません。';
      log('getUserMedia 非対応のため停止', 'e');
    }

    function whenSceneReady(cb) {
      if (sceneEl.hasLoaded) cb(); else sceneEl.addEventListener('loaded', cb, { once: true });
    }
    startBtn.addEventListener('click', () => {
      startBtn.disabled = true; startBtn.textContent = '起動中…'; log('startBtn tapped');
      whenSceneReady(async () => {
        const arSystem = sceneEl.systems['mindar-image-system'];
        if (!arSystem) { log('mindar-image-system が見つかりません', 'e'); return; }
        log('start() 呼び出し（maxTrack: 2）');
        try {
          await arSystem.start();
          log('start() 完了。2枚のマーカーを同時に映してください', 'w');
          ui.classList.add('hidden'); statusEl.classList.remove('hidden');
        } catch (e) {
          log('start() 失敗: ' + (e && e.message ? e.message : e), 'e');
          startBtn.disabled = false; startBtn.textContent = 'カメラを起動してARを開始';
          note.textContent = 'カメラを起動できませんでした。下部ログをご確認ください。';
        }
      });
    });
    window.addEventListener('beforeunload', () => {
      const arSystem = sceneEl.systems['mindar-image-system']; if (arSystem) arSystem.stop();
    });
  </script>
</body>
</html>
